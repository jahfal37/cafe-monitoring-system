<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Cafe - Cafe Monitoring System</title>
    <link rel="stylesheet" href="../src/style.css">
    <script type="module" src="../src/main.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-cafe-secondary font-sans">
    <nav class="bg-white border-b border-gray-100 px-6 py-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-cafe-primary p-2 rounded-lg text-white">
                    <i data-lucide="coffee" class="w-5 h-5"></i>
                </div>
                <span class="font-bold text-xl text-cafe-dark">Cafe Monitoring System</span>
            </div>
            <button id="logoutBtn" class="flex items-center gap-2 text-cafe-dark hover:text-cafe-red font-semibold transition-colors cursor-pointer">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                Logout
            </button>
        </div>
    </nav>

   <main class="max-w-7xl mx-auto p-8 md:p-12">

    <header class="mb-8">
        <h1 class="text-3xl font-bold text-cafe-dark tracking-tight">
            Pilih Cafe
        </h1>
        <p class="text-cafe-muted mt-2">
            Pilih cafe untuk melihat dashboard monitoringnya
        </p>
    </header>

    <div class="flex justify-start mb-8">
        <a href="add-cafe.html"
           class="bg-cafe-primary hover:bg-cafe-accent text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all active:scale-95 flex items-center gap-2">
            Tambah Cafe
        </a>
    </div>

    <!-- INI TEMPAT CARD DINAMIS DARI JS -->
    <div id="cafeList"
         class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    </div>

</main>

    <div id="logoutModal" class="fixed inset-0 z-50 items-center justify-center hidden p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        
        <div class="relative bg-white rounded-cafe shadow-2xl w-full max-w-md p-8 overflow-hidden border border-white transform transition-all">
            <div class="flex flex-col items-center text-center">
                <div class="bg-cafe-red-nonaktive p-4 rounded-full mb-6 text-cafe-red">
                    <i data-lucide="alert-triangle" class="w-10 h-10"></i>
                </div>
                
                <h3 class="text-2xl font-bold text-cafe-dark mb-2">Konfirmasi Logout</h3>
                <p class="text-cafe-muted mb-8 leading-relaxed">
                    Apakah Anda yakin ingin keluar dari sistem? Anda harus login kembali untuk mengakses dashboard.
                </p>
                
                <div class="flex gap-4 w-full">
                    <button id="cancelLogout" class="flex-1 bg-gray-100 hover:bg-gray-200 text-cafe-dark font-bold py-3.5 rounded-xl transition-all cursor-pointer">
                        Batal
                    </button>
                    <button onclick="window.location.href='/index.html'" 
                    class="flex-1 bg-cafe-red hover:bg-red-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-red-200 transition-all cursor-pointer">
                        Ya, Keluar
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
    <script src="js/select-cafe.js"></script>
</body>
</html>
