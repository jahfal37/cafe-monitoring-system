<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Cafe</title>
    <link rel="stylesheet" href="../src/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-screen bg-cafe-secondary font-sans">

    <!-- NAVBAR -->
    <nav class="bg-white border-b border-gray-100 px-6 py-4 flex items-center gap-4 shadow-sm">
        <button onclick="history.back()" class="p-2 hover:bg-gray-100 rounded-full transition-colors cursor-pointer">
            <i data-lucide="arrow-left" class="w-6 h-6 text-cafe-dark"></i>
        </button>
        <div class="bg-cafe-primary p-2 rounded-lg text-white">
            <i data-lucide="coffee" class="w-5 h-5"></i>
        </div>
        <span class="font-bold text-xl text-cafe-dark">Edit Cafe</span>
    </nav>

    <!-- CONTENT -->
    <main class="max-w-4xl mx-auto p-6 md:p-12">
        <div class="bg-white rounded-cafe shadow-cafe-card p-8 md:p-12 border border-white">

            <!-- FORM -->
            <form id="editForm" class="space-y-8">

                <!-- Nama -->
                <div>
                    <label class="block text-sm font-bold text-cafe-dark mb-3">Nama cafe</label>
                    <input id="name" type="text"
                        placeholder="Masukkan nama cafe"
                        class="w-full px-5 py-4 border border-cafe-border rounded-xl focus:outline-none focus:ring-2 focus:ring-cafe-primary/20">
                </div>

                <!-- Alamat -->
                <div>
                    <label class="block text-sm font-bold text-cafe-dark mb-3">Alamat</label>
                    <textarea id="address" rows="4"
                        placeholder="Masukkan alamat cafe"
                        class="w-full px-5 py-4 border border-cafe-border rounded-xl focus:outline-none focus:ring-2 focus:ring-cafe-primary/20 resize-none"></textarea>
                </div>

                <!-- Jam -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-cafe-dark mb-3">Jam Buka</label>
                        <input id="open_time" type="time"
                            class="w-full px-5 py-4 border border-cafe-border rounded-xl focus:outline-none focus:ring-2 focus:ring-cafe-primary/20">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-cafe-dark mb-3">Jam Tutup</label>
                        <input id="close_time" type="time"
                            class="w-full px-5 py-4 border border-cafe-border rounded-xl focus:outline-none focus:ring-2 focus:ring-cafe-primary/20">
                    </div>
                </div>

                <!-- Meja -->
                <div>
                    <label class="block text-sm font-bold text-cafe-dark mb-3">Jumlah Meja</label>
                    <input id="table_count" type="number"
                        placeholder="Jumlah meja"
                        class="w-full px-5 py-4 border border-cafe-border rounded-xl focus:outline-none focus:ring-2 focus:ring-cafe-primary/20">
                </div>

                <!-- Kamera -->
                <div>
                    <label class="block text-sm font-bold text-cafe-dark mb-3">Jumlah Kamera</label>
                    <input id="camera_count" type="number"
                        placeholder="Jumlah kamera"
                        class="w-full px-5 py-4 border border-cafe-border rounded-xl focus:outline-none focus:ring-2 focus:ring-cafe-primary/20">
                </div>

                <!-- Username -->
                <div>
                    <label class="block text-sm font-bold text-cafe-dark mb-3">Username</label>
                    <input id="username" type="text"
                        placeholder="Username"
                        class="w-full px-5 py-4 border border-cafe-border rounded-xl focus:outline-none focus:ring-2 focus:ring-cafe-primary/20">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-bold text-cafe-dark mb-3">Password</label>
                    <input id="password" type="password"
                        placeholder="Kosongkan jika tidak diubah"
                        class="w-full px-5 py-4 border border-cafe-border rounded-xl focus:outline-none focus:ring-2 focus:ring-cafe-primary/20">
                </div>

                <!-- BUTTON -->
                <div class="flex flex-col md:flex-row gap-4 pt-6">
                    <button type="button" onclick="history.back()"
                        class="flex-1 bg-white border-2 border-cafe-border hover:bg-gray-50 text-cafe-dark font-bold py-4 rounded-xl">
                        Batal
                    </button>

                    <button type="submit"
                        class="flex-1 bg-cafe-primary hover:bg-cafe-accent text-white font-bold py-4 rounded-xl shadow-lg">
                        Update
                    </button>
                </div>

            </form>
        </div>
    </main>

    <!-- SCRIPT -->
    <script>
        lucide.createIcons();
    </script>

    <!-- JS UTAMA -->
    <script src="/view/bapenda/js/edit-cafe.js"></script>

</body>
</html>
